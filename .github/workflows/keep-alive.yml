name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  push:
    branches:
      - main
      - test/keep-alive
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "=== DEBUG START ==="
          echo "Step 1: Check if secrets exist"
          echo "URL: ${{ secrets.VITE_SUPABASE_URL }}"
          echo "URL length: $(echo -n '${{ secrets.VITE_SUPABASE_URL }}' | wc -c)"
          echo "Key length: $(echo -n '${{ secrets.VITE_SUPABASE_ANON_KEY }}' | wc -c)"
          
          echo ""
          echo "Step 2: Attempting curl..."
          curl -v \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" 2>&1 | head -20
          
          echo ""
          echo "Step 3: Getting HTTP status code..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          
          echo "Status code: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
            echo "✓ Supabase is alive"
            exit 0
          else
            echo "✗ Failed with status $STATUS"
            exit 1
          fi
