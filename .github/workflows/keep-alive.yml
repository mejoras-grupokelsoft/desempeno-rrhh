name: Keep Supabase Alive

on:
  schedule:
    # Corre cada 3 días a las 8am UTC (evita el pausing por inactividad)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Permite correrlo manualmente también

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Testing Supabase connectivity..."
          echo "URL: $SUPABASE_URL"
          echo "Key length: ${#ANON_KEY}"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $ANON_KEY")
          
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
            echo "✓ Supabase is alive"
            exit 0
          else
            echo "✗ Supabase returned status $STATUS"
            exit 1
          fi
